spring.application.name=utility-backend
server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/utilitydb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


app.jwt.secret=utilityInternationalSuperSecretKey2025MustBeAtLeast256BitsLong
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000


springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

logging.level.com.utilityinternational=DEBUG
logging.level.org.springframework.security=INFO